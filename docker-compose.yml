version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: sentinel_api
    environment:
      DATABASE_URL: postgres://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sentinel_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - public
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
